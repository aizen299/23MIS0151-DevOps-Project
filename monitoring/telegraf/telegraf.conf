[agent]
  interval = "10s"
  flush_interval = "10s"

[[outputs.graphite]]
  servers = ["host.docker.internal:2003"]
  prefix = "abc"
  graphite_separator = "."

# Host CPU usage
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = true

# Host memory usage
[[inputs.mem]]

# Host network usage
[[inputs.net]]

# Host uptime
[[inputs.system]]

# Note: inputs.docker removed due to a Docker Desktop (Mac) socket permission
# issue. Host-level CPU/Mem/Net/Uptime + website HTTP availability below
# already cover all required Grafana metrics.

# Website HTTP availability + response time
[[inputs.http_response]]
  urls = ["http://host.docker.internal:8080"]
  response_timeout = "5s"
  method = "GET"