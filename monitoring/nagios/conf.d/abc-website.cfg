define host {
    use                     linux-server
    host_name               abc-website-host
    alias                   ABC Technologies Website Host
    address                 host.docker.internal
    max_check_attempts      3
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               abc-website-host
    service_description     HTTP
    check_command           check_http!-p 8080
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    notification_interval   30
}
